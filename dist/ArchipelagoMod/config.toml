# Mod options
enabled = true
reload_key = "F7" # Recommended to use from the song list.
reload_delay = 10 # 1-10, default 10 to wait for reload. lower is faster but may break. best with DivaModLoader PR #36

# Prefilled connection info
slot_name = "Player1"
slot_server = "archipelago.gg:38281"
slot_password = ""

# Defaults for these options which can then be adjusted in the in-game client
autohide          = true    # true/false, default false. automatically hide songs with no new checks
deathlink_percent = 100     # 0-100, default 100 percent of max HP to lose on receive. <100 for non-lethal
deathlink_safety  = 10.0    # 0-30, default 10.0 seconds after receiving a DL where dying does not send one out
trap_duration     = 15.0    # 0-300, default 15.0 seconds until traps expire. 0 to not expire for current attempt
icon_reroll       = 60.0    # 0-60, default 60.0 seconds between icon rerolls while Icon trap is active. 0 to reroll once
suhidden          = false   # true/false, default false. true to let sudden and hidden modifiers overlap otherwise replace each other
skip_mainmenu     = false   # true/false, default false. skip the main menu after title screen. combine with IntroPatch to skip to song select

# Mod information
name = "Archipelago"
author = "Cynichill"
version = "1.2.2"
dll = ["ArchipelagoMod.dll"]
include = ["."]
